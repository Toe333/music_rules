name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # hatch-vcs needs full history

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install package + dev extras
        run: uv sync --extra dev

      - name: Lint (ruff check)
        run: uv run ruff check src tests

      - name: Format check (ruff format)
        run: uv run ruff format --check src tests

      - name: Type check (mypy on core)
        run: uv run mypy src/music_rules/core

      - name: Run tests
        run: uv run pytest --cov=music_rules --cov-report=term-missing

  schema-validate:
    name: Validate rule corpus against JSON Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Validate
        run: |
          uv run --with jsonschema --python 3.12 python - <<'EOF'
          import json
          from pathlib import Path

          import jsonschema

          corpus = json.loads(Path("src/music_rules/data/rules_combined.json").read_text())
          schema = json.loads(Path("src/music_rules/data/rules.schema.json").read_text())
          jsonschema.validate(instance=corpus, schema=schema)
          print(f"OK: {len(corpus['rules'])} rules validate against schema.")
          EOF
